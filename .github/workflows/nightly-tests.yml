name: nightly-tests
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  pull_request: { types: [opened, reopened, synchronize] }
  push: { branches: [main] }
  schedule:
    - cron: "0 6 * * 6"

defaults:
  run:
    shell: bash --noprofile --norc -Eeuo pipefail {0}

env:
  RUN_LINK: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

jobs:
  check-tests-relevance:
    runs-on: ubuntu-latest

    container: swift:6.3-noble

    timeout-minutes: 10

    permissions:
      pull-requests: write # For the skip comment
      contents: read

    outputs:
      should-run: ${{ steps.decide.outputs.should-run }}

    steps:
      - name: Generate swift-dns-helper token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.SWIFT_DNS_HELPER_CLIENT_ID }}
          private-key: ${{ secrets.SWIFT_DNS_HELPER_PRIVATE_KEY }}

      - name: Install jq
        run: apt-get update -y && apt-get install -y jq

      - name: Check out code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git
        run: git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Decide whether tests must run
        id: decide
        env:
          GITHUB_OBJECT: ${{ toJson(github) }}
        run: |
          SHOULD_RUN="$(.github/scripts/check-tests-relevance.sh)"
          printf '%s\n' "should-run=${SHOULD_RUN}" >> "${GITHUB_OUTPUT}"

      - name: Construct skip comment
        if: steps.decide.outputs.should-run == 'false'
        run: |
          printf '%s\n' "## [Nightly Tests](${RUN_LINK}) Report" >> skip-comment.md
          printf '%s\n' '**⏭️ No test-relevant changes — nightly tests skipped ⏭️**' >> skip-comment.md

      - name: Comment in PR
        if: steps.decide.outputs.should-run == 'false'
        uses: thollander/actions-comment-pull-request@24bffb9b452ba05a4f3f77933840a6a841d1b32b # v3.0.1
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          pr-number: ${{ github.event.pull_request.number }}
          file-path: skip-comment.md
          comment-tag: nightly-tests-ci-comment

  linux-nightly-tests:
    needs: check-tests-relevance
    if: ${{ !cancelled() && needs.check-tests-relevance.outputs.should-run != 'false' }}

    strategy:
      fail-fast: false
      matrix:
        swift-image:
          - name: swiftlang/swift:nightly-main-noble
        config:
          - mode: "debug"
          - mode: "release"

    runs-on: ubuntu-latest

    container: ${{ matrix.swift-image.name }}

    timeout-minutes: 15

    steps:
      - name: Check out ${{ github.event.repository.name }}
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install zstd for faster caching, and curl for codecov action
        run: |
          apt-get update -y
          apt-get install -y zstd curl

      - name: Restore .build
        if: ${{ runner.debug != '1' }}
        id: "restore-cache"
        uses: actions/cache/restore@v6
        with:
          path: .build
          key: "${{ github.event.repository.name }}-nightly-unit-tests-${{ matrix.config.mode }}-build-${{ matrix.swift-image.name }}-${{ runner.os }}-${{ hashFiles('./Package.resolved') }}"
          restore-keys: "${{ github.event.repository.name }}-nightly-unit-tests-${{ matrix.config.mode }}-build-${{ matrix.swift-image.name }}-${{ runner.os }}-"

      - name: Build ${{ github.event.repository.name }}
        run: |
          # keeping code coverage flag to check for regressions
          swift build \
            --build-tests \
            --enable-code-coverage \
            --explicit-target-dependency-import-check error \
            -Xswiftc -require-explicit-sendable \
            -c ${{ matrix.config.mode }}

      - name: Cache .build
        if: steps.restore-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: .build
          key: "${{ github.event.repository.name }}-nightly-unit-tests-${{ matrix.config.mode }}-build-${{ matrix.swift-image.name }}-${{ runner.os }}-${{ hashFiles('./Package.resolved') }}"

      - name: Run tests
        run: |
          # keeping code coverage flag to check for regressions
          swift test \
            --skip "IntegrationTests." \
            --skip-build \
            --enable-code-coverage \
            -Xswiftc -require-explicit-sendable \
            -c ${{ matrix.config.mode }}

  cache-swiftly-toolchain-for-macos:
    needs: check-tests-relevance
    if: ${{ !cancelled() && needs.check-tests-relevance.outputs.should-run != 'false' }}

    strategy:
      fail-fast: false
      matrix:
        swift:
          - version: main-snapshot

    runs-on: macos-26

    timeout-minutes: 20

    env:
      SWIFTLY_HOME_DIR: "/Users/runner/.swiftly"
      SWIFTLY_BIN_DIR: "/Users/runner/.swiftly/bin"
      SWIFTLY_TOOLCHAINS_DIR: "/Users/runner/Library/Developer/Toolchains"

    steps:
      - name: Set today's date
        run: printf '%s\n' "TODAY=$(date "+%Y-%m-%d")" >> "${GITHUB_ENV}"

      - name: Restore swiftly home
        if: ${{ runner.debug != '1' }}
        id: "restore-home"
        uses: actions/cache/restore@v6
        with:
          path: "${{ env.SWIFTLY_HOME_DIR }}"
          key: "${{ github.event.repository.name }}-swiftly-home-${{ matrix.swift.version }}-${{ env.TODAY }}-${{ runner.os }}"

      - name: Restore swiftly bin
        if: ${{ runner.debug != '1' }}
        id: "restore-bin"
        uses: actions/cache/restore@v6
        with:
          path: "${{ env.SWIFTLY_BIN_DIR }}"
          key: "${{ github.event.repository.name }}-swiftly-bin-${{ matrix.swift.version }}-${{ env.TODAY }}-${{ runner.os }}"

      - name: Restore swiftly toolchains
        if: ${{ runner.debug != '1' }}
        id: "restore-toolchains"
        uses: actions/cache/restore@v6
        with:
          path: "${{ env.SWIFTLY_TOOLCHAINS_DIR }}"
          key: "${{ github.event.repository.name }}-swiftly-toolchain-${{ matrix.swift.version }}-${{ env.TODAY }}-${{ runner.os }}"

      - name: Update swift via Swiftly
        run: |
          # Installation commands from https://www.swift.org/install/macos
          curl -O https://download.swift.org/swiftly/darwin/swiftly.pkg
          installer -pkg swiftly.pkg -target CurrentUserHomeDirectory
          "${SWIFTLY_BIN_DIR}/swiftly" init --assume-yes --skip-install --quiet-shell-followup
          . "${SWIFTLY_HOME_DIR}/env.sh"

          # Update GitHub PATH
          printf '%s\n' "${SWIFTLY_BIN_DIR}" >>"${GITHUB_PATH}"

          # Update swift
          swiftly install --assume-yes ${{ matrix.swift.version }}
          swiftly use --assume-yes ${{ matrix.swift.version }}

      - name: Cache swiftly home
        if: steps.restore-home.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: "${{ env.SWIFTLY_HOME_DIR }}"
          key: "${{ github.event.repository.name }}-swiftly-home-${{ matrix.swift.version }}-${{ env.TODAY }}-${{ runner.os }}"

      - name: Cache swiftly bin
        if: steps.restore-bin.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: "${{ env.SWIFTLY_BIN_DIR }}"
          key: "${{ github.event.repository.name }}-swiftly-bin-${{ matrix.swift.version }}-${{ env.TODAY }}-${{ runner.os }}"

      - name: Cache swiftly toolchains
        if: steps.restore-toolchains.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: "${{ env.SWIFTLY_TOOLCHAINS_DIR }}"
          key: "${{ github.event.repository.name }}-swiftly-toolchain-${{ matrix.swift.version }}-${{ env.TODAY }}-${{ runner.os }}"

  macos-nightly-tests:
    strategy:
      fail-fast: false
      matrix:
        macos:
          - version: macos-15
          - version: macos-26
        xcode:
          - version: latest-stable
        swift:
          - version: main-snapshot
        config:
          - mode: "debug"
          - mode: "release"

    runs-on: ${{ matrix.macos.version }}

    needs: [cache-swiftly-toolchain-for-macos, check-tests-relevance]
    if: ${{ !cancelled() && needs.check-tests-relevance.outputs.should-run != 'false' }}

    timeout-minutes: 20

    env:
      SWIFTLY_HOME_DIR: "/Users/runner/.swiftly"
      SWIFTLY_BIN_DIR: "/Users/runner/.swiftly/bin"
      SWIFTLY_TOOLCHAINS_DIR: "/Users/runner/Library/Developer/Toolchains"

    steps:
      - name: Setup appropriate Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.xcode.version }}

      - name: Check out ${{ github.event.repository.name }}
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set today's date
        run: printf '%s\n' "TODAY=$(date "+%Y-%m-%d")" >> "${GITHUB_ENV}"

      - name: Restore swiftly home
        id: "restore-home"
        uses: actions/cache/restore@v6
        with:
          path: "${{ env.SWIFTLY_HOME_DIR }}"
          key: "${{ github.event.repository.name }}-swiftly-home-${{ matrix.swift.version }}-${{ env.TODAY }}-${{ runner.os }}"

      - name: Restore swiftly bin
        id: "restore-bin"
        uses: actions/cache/restore@v6
        with:
          path: "${{ env.SWIFTLY_BIN_DIR }}"
          key: "${{ github.event.repository.name }}-swiftly-bin-${{ matrix.swift.version }}-${{ env.TODAY }}-${{ runner.os }}"

      - name: Restore swiftly toolchains
        id: "restore-toolchains"
        uses: actions/cache/restore@v6
        with:
          path: "${{ env.SWIFTLY_TOOLCHAINS_DIR }}"
          key: "${{ github.event.repository.name }}-swiftly-toolchain-${{ matrix.swift.version }}-${{ env.TODAY }}-${{ runner.os }}"

      - name: Update swift via Swiftly
        run: |
          # Workaround some kind of GitHub caching issue where it struggles to restore or cache the swiftly toolchain
          BLOCK_SIZE="$(du -s '${{ env.SWIFTLY_TOOLCHAINS_DIR }}' | awk '{print $1}')"
          if [[ "${BLOCK_SIZE}" -lt 1024 ]]; then
            printf '%s\n' "Toolchain directory is too small (${BLOCK_SIZE} blocks), deleting all swiftly directories for fresh installation"
            rm -rf '${{ env.SWIFTLY_TOOLCHAINS_DIR }}' '${{ env.SWIFTLY_BIN_DIR }}' '${{ env.SWIFTLY_HOME_DIR }}'
          else
            printf '%s\n' "Toolchain directory is large enough (${BLOCK_SIZE} blocks), will use the restored toolchain"
          fi

          # Installation commands from https://www.swift.org/install/macos
          curl -O https://download.swift.org/swiftly/darwin/swiftly.pkg
          installer -pkg swiftly.pkg -target CurrentUserHomeDirectory
          "${SWIFTLY_BIN_DIR}/swiftly" init --assume-yes --skip-install --quiet-shell-followup
          . "${SWIFTLY_HOME_DIR}/env.sh"

          # Update GitHub PATH
          printf '%s\n' "${SWIFTLY_BIN_DIR}" >>"${GITHUB_PATH}"

          # Update swift
          swiftly install --assume-yes ${{ matrix.swift.version }}
          swiftly use --assume-yes ${{ matrix.swift.version }}

      - name: Restore .build
        if: ${{ runner.debug != '1' }}
        id: "restore-cache"
        uses: actions/cache/restore@v6
        with:
          path: .build
          key: "${{ github.event.repository.name }}-unit-tests-${{ matrix.config.mode }}-build-${{ matrix.swift.version }}-${{ matrix.macos.version }}-${{ hashFiles('./Package.resolved') }}"
          restore-keys: "${{ github.event.repository.name }}-unit-tests-${{ matrix.config.mode }}-build-${{ matrix.swift.version }}-${{ matrix.macos.version }}-"

      - name: Build ${{ github.event.repository.name }}
        run: |
          swift build \
            --build-tests \
            --enable-code-coverage \
            --explicit-target-dependency-import-check error \
            -Xswiftc -require-explicit-sendable \
            -c ${{ matrix.config.mode }}

      - name: Cache .build
        if: steps.restore-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: .build
          key: "${{ github.event.repository.name }}-unit-tests-${{ matrix.config.mode }}-build-${{ matrix.swift.version }}-${{ matrix.macos.version }}-${{ hashFiles('./Package.resolved') }}"

      - name: Run tests
        run: |
          # keeping code coverage flag to check for regressions
          swift test \
            --skip "IntegrationTests." \
            --skip-build \
            --enable-code-coverage \
            -Xswiftc -require-explicit-sendable \
            -c ${{ matrix.config.mode }}

  android-nightly-tests:
    needs: check-tests-relevance
    if: ${{ !cancelled() && needs.check-tests-relevance.outputs.should-run != 'false' }}

    strategy:
      fail-fast: false
      matrix:
        swift:
          - version: nightly-main
        config:
          - mode: "debug"
          - mode: "release"

    runs-on: ubuntu-latest

    timeout-minutes: 30

    steps:
      - name: Ensure zstd is available for faster caching
        run: sudo apt-get update -yq && sudo apt-get install -yq zstd

      - name: Check out code
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Replace symlinks with the actual files
        run: find . -type l -exec sh -c 'LINKED="$(readlink -f "{}")"; rm "{}"; cp -a "${LINKED}" "{}"' \;

      - name: Run unit tests
        uses: skiptools/swift-android-action@2044b79660f201ccef8cbce62877e4ec5409f9c8 # v2.9.5
        with:
          # Ubuntu runners low on space causes the emulator to fail to install
          free-disk-space: true
          android-emulator-test-folder: /data/local/tmp/android-xctest
          test-env: PROJECT_ROOT_FOR_TESTING=/data/local/tmp/android-xctest
          swift-version: ${{ matrix.swift.version }}
          swift-configuration: ${{ matrix.config.mode }}
          copy-files: Tests
          swift-build-flags: >-
            --build-tests
            --explicit-target-dependency-import-check error
          swift-test-flags: --skip "IntegrationTests."
